name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest
        # The cross-org RLS test (tests/test_rls_isolation.py) needs a live
        # Postgres and self-skips when DATABASE_URL is unset, so unit tests run
        # here and the DB test stays a manual/Supabase check for now.
        run: pytest -q
